  <text x="562" y="428" fill="#BAE6FD" font-size="10" font-family="sans-serif" font-weight="600">Cold return in</text>
  <text x="562" y="440" fill="#6B7280" font-size="8"  font-family="sans-serif">from heating system</text>
</svg>
