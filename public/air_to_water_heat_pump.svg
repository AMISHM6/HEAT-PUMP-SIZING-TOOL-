  <polygon points="468,262 478,272 468,282 458,272" fill="#374151"/>
  <text x="468" y="310" fill="#9CA3AF" font-size="8" text-anchor="middle" font-family="sans-serif" letter-spacing="0.5">PUMP</text>

  <!-- Internal connections (faint) -->
  <path d="M356,240 L356,186 L402,186" fill="none" stroke="#FB923C" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M392,168 L375,168 L375,240 L388,240" fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M468,248 L468,228" fill="none" stroke="#EF4444" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Indoor labels -->
  <text x="410" y="358" fill="#D1D5DB" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif" letter-spacing="0.5">INDOOR UNIT</text>
  <text x="410" y="373" fill="#6B7280" font-size="9" text-anchor="middle" font-family="sans-serif">Hydraulic module</text>

  <!-- ═══ WATER PIPES ═══ -->
  <path d="M502,134 L555,134 L555,14" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar)"/>
  <path d="M502,194 L555,194 L555,445" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ac)"/>

