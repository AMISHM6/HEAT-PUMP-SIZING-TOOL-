  <path d="M2,148 L11,148" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#ab)" fill="none"/>
  <path d="M2,165 L11,165" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#ab)" fill="none"/>
  <path d="M2,182 L11,182" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#ab)" fill="none"/>
  <path d="M2,199 L11,199" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#ab)" fill="none"/>
  <text x="4" y="137" fill="#60A5FA" font-size="8" font-family="sans-serif">Air in</text>

