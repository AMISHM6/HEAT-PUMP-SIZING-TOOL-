  <path d="M202,98 L308,98" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" fill="none" marker-end="url(#ab)"/>
  <path d="M202,92 L308,92" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
