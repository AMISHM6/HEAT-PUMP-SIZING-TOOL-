  <path d="M308,308 L202,308" stroke="#FB923C" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#ao)"/>
  <text x="255" y="324" fill="#FDBA74" font-size="8" text-anchor="middle" font-family="sans-serif">Liquid line (high pressure)</text>
  <circle cx="202" cy="98"  r="4" fill="#60A5FA"/>
  <circle cx="202" cy="308" r="4" fill="#FB923C"/>
  <circle cx="308" cy="98"  r="4" fill="#60A5FA"/>
  <circle cx="308" cy="308" r="4" fill="#FB923C"/>

  <!-- ═══ INDOOR HYDRAULIC UNIT ═══ -->
  <rect x="310" y="32" width="200" height="318" rx="13" fill="#0d1117" stroke="#374151" stroke-width="1.5"/>

