  <line x1="344" y1="260" x2="368" y2="284" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="368" y1="260" x2="344" y2="284" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
