  <path d="M412,194 Q420,186 428,194 Q436,202 444,194 Q452,186 460,194 Q468,202 476,194 Q484,186 496,194" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M412,208 Q420,200 428,208 Q436,216 444,208 Q452,200 460,208 Q468,216 476,208 Q484,200 496,208" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>

