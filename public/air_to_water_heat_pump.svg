  <polygon points="392,168 404,155 404,181" fill="#374151" stroke="#6B7280" stroke-width="1.2"/>
  <text x="383" y="195" fill="#9CA3AF" font-size="8" text-anchor="middle" font-family="sans-serif">EXP.</text>
  <text x="383" y="205" fill="#9CA3AF" font-size="8" text-anchor="middle" font-family="sans-serif">VALVE</text>

