  <text x="107" y="358" fill="#D1D5DB" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif" letter-spacing="0.5">OUTDOOR UNIT</text>
  <text x="107" y="373" fill="#6B7280" font-size="9" text-anchor="middle" font-family="sans-serif">Fan + Evaporator coil</text>

