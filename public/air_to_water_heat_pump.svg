  <text x="452" y="107" fill="#4B5563" font-size="8" text-anchor="middle" font-family="sans-serif" letter-spacing="0.5">HEAT EXCHANGER</text>
  <path d="M412,126 Q420,118 428,126 Q436,134 444,126 Q452,118 460,126 Q468,134 476,126 Q484,118 496,126" fill="none" stroke="#FB923C" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M412,140 Q420,132 428,140 Q436,148 444,140 Q452,132 460,140 Q468,148 476,140 Q484,132 496,140" fill="none" stroke="#FB923C" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M412,154 Q420,146 428,154 Q436,162 444,154 Q452,146 460,154 Q468,162 476,154 Q484,146 496,154" fill="none" stroke="#FB923C" stroke-width="1.5" stroke-linecap="round"/>
